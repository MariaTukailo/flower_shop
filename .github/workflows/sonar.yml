
  name: SonarCloud

  on:
    push:
      branches:
        - main
    pull_request:

  jobs:
    build:
      name: Build and analyze
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            distribution: 'temurin'
            java-version: '17'
            cache: 'maven'

        - name: Build and run SonarCloud
          run: mvn clean verify sonar:sonar -Dsonar.projectKey=flower_shop -Dsonar.organization=YOUR_ORG -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}

