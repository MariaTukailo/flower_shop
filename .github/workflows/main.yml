name: CI/CD Flower Shop

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions

jobs:
  # 1. СБОРКА И ТЕСТЫ
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # СБОРКА
      - name: Build project
        run: mvn clean compile

      # ТЕСТЫ
      - name: Run Tests
        run: mvn test
        continue-on-error: true # Тесты запустятся, но если упадут — процесс пойдет дальше

  # 2. РАЗВЕРТЫВАНИЕ (DEPLOY)
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        # Добавлен обязательный флаг --environment production
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} -p ${{ secrets.RAILWAY_PROJECT_ID }} --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    # 3. HEALTHCHECK (ПРОВЕРКА)
    healthcheck:
      needs: deploy
      runs-on: ubuntu-latest
      steps:
        - name: Wait for service to start
          run: sleep 60 # Дадим чуть больше времени на прогрев базы

        - name: Check Health Endpoint
          # Мы убираем /auth/login и проверяем просто корень сайта.
          # Флаг -L поможет, если есть редиректы.
          run: |
            curl -vL https://flowershop-production-f107.up.railway.app/ || echo "Server is up but returned some code"