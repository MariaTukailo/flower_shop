name: CI/CD Flower Shop

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build project
        run: mvn clean compile

      - name: Run Tests
        run: mvn test
        continue-on-error: true


  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} -p ${{ secrets.RAILWAY_PROJECT_ID }} --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}


  healthcheck:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for service to start
        run: sleep 60

      - name: Check Health Endpoint
        run: |
          curl --fail --silent --show-error https://flowershop-production-f107.up.railway.app/ || exit 1