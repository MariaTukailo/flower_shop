spring.application.name=flower_shop
spring.datasource.url=jdbc:postgresql://localhost:5432/flower_shop
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace
spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true

spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.type.enums_using_name=true

springdoc.writer-with-default-pretty-printer=true
springdoc.api-docs.use-management-port=false

springdoc.override-with-generic-response=true